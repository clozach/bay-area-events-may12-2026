<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Happy 21st Birthday, Lily — May 12, 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Pinyon+Script&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f4ead5;
  --cream-deep:#ebdfc1;
  --linen:#e6d6b3;
  --bone:#fdf8ec;
  --tan:#b8916b;
  --camel:#9d774e;
  --sepia:#6b513a;
  --ink:#3d2f20;
  --gold:#b8945a;
  --sf:#b06f5a;
  --sfl:#f4e3da;
  --sfm:#e3bfae;
  --eb:#6b7f48;
  --ebl:#ecefd6;
  --ebm:#c7d4a3;
  --tw:62px;
  --serif:'Cormorant Garamond','EB Garamond',Georgia,serif;
  --display:'Playfair Display','DM Serif Display',Georgia,serif;
  --script:'Pinyon Script','Petit Formal Script',cursive;
}
html,body{background:var(--cream)}
body{
  font-family:var(--serif);
  color:var(--ink);
  background-image:
    radial-gradient(ellipse at 18% 22%,rgba(184,145,107,.10) 0,transparent 45%),
    radial-gradient(ellipse at 82% 78%,rgba(107,127,72,.08) 0,transparent 45%),
    radial-gradient(circle at 50% 50%,rgba(253,248,236,.5) 0,transparent 70%);
  min-height:100vh;
}
.birthday{
  text-align:center;
  padding:34px 20px 30px;
  background:linear-gradient(180deg,var(--bone) 0%,var(--cream) 100%);
  border-bottom:1px solid var(--linen);
  position:relative;
}
.birthday::before{
  content:'';
  position:absolute;
  left:50%;
  bottom:-1px;
  transform:translateX(-50%);
  width:140px;
  height:3px;
  background:var(--tan);
  border-top:1px solid var(--bone);
  border-bottom:1px solid var(--bone);
  box-shadow:0 -2px 0 var(--tan),0 2px 0 var(--tan);
}
.birthday-greet{
  font-family:var(--display);
  font-size:1.05rem;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:var(--sepia);
  font-weight:500;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  margin-bottom:4px;
}
.birthday-num{
  display:inline-block;
  font-size:1.62em;
  line-height:1;
  vertical-align:baseline;
  transform:translateY(3px);
  letter-spacing:.05em;
}
.birthday-greet sup{
  font-size:.65em;
  letter-spacing:0;
  vertical-align:super;
  margin-left:-3px;
  position:relative;
  top:-3px;
}
.birthday-rule{
  display:inline-block;
  height:1px;
  width:80px;
  background:var(--tan);
  opacity:.55;
}
.birthday-ornament{color:var(--tan);font-size:.85rem;opacity:.75}
.birthday-name{
  font-family:var(--script);
  font-size:6rem;
  color:var(--camel);
  line-height:1.05;
  margin:2px 0 4px;
  font-weight:400;
  letter-spacing:.01em;
  text-shadow:0 1px 0 rgba(255,250,239,.8);
}
.birthday-sub{
  font-family:var(--serif);
  font-size:1.08rem;
  font-style:italic;
  color:var(--sepia);
  letter-spacing:.04em;
  margin-top:2px;
}
.birthday-love{
  font-family:var(--serif);
  font-size:.92rem;
  font-style:italic;
  color:var(--camel);
  letter-spacing:.08em;
  margin-top:10px;
}
.hdr{
  background:linear-gradient(180deg,#3d2f20,#2b2014);
  color:var(--cream);
  padding:16px 24px;
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 4px 14px rgba(61,47,32,.28);
  border-bottom:3px double var(--tan);
}
.hdr-l{flex:1 1 240px;min-width:0}
.hdr-title{
  font-family:var(--display);
  font-size:1.18rem;
  font-weight:600;
  letter-spacing:.08em;
}
.hdr-title i{color:var(--tan);margin-right:6px}
.hdr-sub{
  font-family:var(--serif);
  font-size:.92rem;
  color:#d9c7a0;
  font-style:italic;
  margin-top:2px;
  letter-spacing:.04em;
}
.hdr-right{margin-left:auto;display:flex;gap:20px}
.leg{
  display:flex;
  align-items:center;
  gap:7px;
  font-family:var(--display);
  font-size:.72rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:#d9c7a0;
}
.leg-dot{
  width:11px;
  height:11px;
  border-radius:50%;
  border:1px solid rgba(244,234,213,.3);
  box-shadow:0 0 0 2px rgba(244,234,213,.08);
}
.allday-bar{
  background:var(--bone);
  border-bottom:1px solid var(--linen);
  padding:12px 14px 12px calc(var(--tw) + 22px);
  position:relative;
}
.allday-lbl{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  font-family:var(--display);
  font-size:.68rem;
  color:var(--camel);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.22em;
}
.allday-inner{display:flex;flex-direction:column;gap:7px}
.allday-sec{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.allday-sec-lbl{
  font-family:var(--display);
  font-size:.62rem;
  font-weight:700;
  text-transform:uppercase;
  padding:3px 9px;
  border-radius:1px;
  margin-right:4px;
  letter-spacing:.16em;
}
.allday-sec-lbl.sf{background:var(--sfm);color:var(--sf)}
.allday-sec-lbl.eb{background:var(--ebm);color:var(--eb)}
.pill{
  padding:5px 12px;
  border-radius:2px;
  font-family:var(--serif);
  font-size:.92rem;
  font-weight:500;
  cursor:pointer;
  transition:transform .18s ease,box-shadow .18s ease;
  white-space:nowrap;
  max-width:300px;
  overflow:hidden;
  text-overflow:ellipsis;
  letter-spacing:.015em;
}
.pill:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(61,47,32,.18)}
.pill.sf{background:var(--sfl);color:var(--sf);border:1px solid var(--sfm)}
.pill.eb{background:var(--ebl);color:var(--eb);border:1px solid var(--ebm)}
.diary{display:flex;overflow-x:hidden;background:var(--cream)}
.tax{width:var(--tw);flex-shrink:0;position:sticky;left:0;z-index:5;background:var(--cream)}
.taxl{position:relative}
.tl{position:absolute;left:0;right:0;transform:translateY(-50%)}
.hf{
  display:block;
  text-align:right;
  padding-right:10px;
  font-family:var(--display);
  font-size:.74rem;
  font-weight:500;
  font-style:italic;
  color:var(--camel);
  letter-spacing:.04em;
}
.hr{
  border-top:1px solid rgba(184,145,107,.22);
  left:0;
  right:0;
  position:absolute;
  transform:none;
}
.cols{flex:1;display:flex;flex-direction:column;min-width:0}
.col-hdr-row{display:flex;background:var(--bone);border-bottom:2px solid var(--linen)}
.col-hdr{
  flex:1;
  padding:12px 12px;
  font-family:var(--display);
  font-size:.95rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.22em;
  text-align:center;
  border-bottom:3px solid;
}
.col-hdr.sf{background:var(--sfl);color:var(--sf);border-color:var(--sf)}
.col-hdr.eb{background:var(--ebl);color:var(--eb);border-color:var(--eb)}
.col-inner{position:relative;display:flex;flex:1}
.col-inner>.tlines{position:absolute;inset:0;pointer-events:none}
.evb{
  position:absolute;
  border-radius:3px;
  padding:6px 9px 22px;
  cursor:pointer;
  border-left:3px solid;
  overflow:hidden;
  transition:transform .15s ease,box-shadow .15s ease;
  background:var(--bone);
  box-shadow:0 1px 3px rgba(61,47,32,.07);
}
.evb:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(61,47,32,.18)}
.evb.sf{border-color:var(--sf);background:linear-gradient(135deg,#faefe9,var(--bone))}
.evb.eb{border-color:var(--eb);background:linear-gradient(135deg,#f1f4e3,var(--bone))}
.ev-title{
  font-family:var(--display);
  font-size:.84rem;
  font-weight:600;
  color:var(--ink);
  line-height:1.3;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  letter-spacing:.01em;
}
.ev-city{
  font-family:var(--serif);
  font-size:.78rem;
  color:var(--sepia);
  font-style:italic;
  font-weight:500;
  margin-top:2px;
}
.ev-drive{
  font-family:var(--serif);
  font-size:.72rem;
  color:var(--camel);
  font-style:italic;
}
.ev-cost{
  font-family:var(--display);
  font-size:.78rem;
  color:var(--ink);
  font-weight:600;
  margin-top:3px;
}
.ev-ico{position:absolute;bottom:5px;right:8px;font-size:.9rem;opacity:.55}
.evb.sf .ev-ico{color:var(--sf)}
.evb.eb .ev-ico{color:var(--eb)}
.evb.sold-out{filter:saturate(.55)}
.evb.sold-out .ev-title,
.evb.sold-out .ev-city,
.evb.sold-out .ev-drive,
.evb.sold-out .ev-cost{opacity:.55}
.sold-stamp{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:2;
  overflow:hidden;
}
.sold-stamp::before{
  content:"";
  position:absolute;
  left:-12%;
  right:-12%;
  top:50%;
  height:2px;
  background:#a23a2a;
  transform:translateY(-50%) rotate(-18deg);
  opacity:.85;
}
.sold-stamp-text{
  position:relative;
  font-family:var(--display);
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:#a23a2a;
  background:var(--bone);
  padding:1px 6px;
  border:1.5px solid #a23a2a;
  border-radius:2px;
  transform:rotate(-18deg);
  box-shadow:0 1px 3px rgba(61,47,32,.12);
}
.ovl{
  position:fixed;
  inset:0;
  background:rgba(45,35,25,.68);
  backdrop-filter:blur(5px);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
  opacity:0;
  transition:opacity .25s;
  pointer-events:none;
}
.ovl.active{opacity:1;pointer-events:all}
.mcard{
  background:var(--bone);
  border-radius:6px;
  width:100%;
  max-width:880px;
  max-height:92vh;
  overflow-y:auto;
  box-shadow:0 24px 60px rgba(45,35,25,.5);
  transform:scale(.96) translateY(20px);
  transition:transform .3s;
  border:1px solid var(--linen);
}
.ovl.active .mcard{transform:scale(1) translateY(0)}
.mhero{
  height:170px;
  background:linear-gradient(135deg,#3d2f20,#5a4632);
  border-radius:6px 6px 0 0;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:flex-end;
}
.mhero-c{padding:14px 22px;position:relative;z-index:1}
.mcat{
  display:inline-block;
  padding:3px 13px;
  border-radius:2px;
  font-family:var(--display);
  font-size:.7rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.18em;
  margin-bottom:8px;
}
.mcat.sf{background:var(--sf);color:var(--bone)}
.mcat.eb{background:var(--eb);color:var(--bone)}
.mhero-img{
  color:var(--bone);
  font-family:var(--display);
  font-size:1.65rem;
  font-weight:600;
  line-height:1.22;
  text-shadow:0 1px 4px rgba(0,0,0,.6);
  max-width:760px;
  letter-spacing:.01em;
}
.mcls{
  position:absolute;
  top:12px;
  right:12px;
  width:34px;
  height:34px;
  border-radius:50%;
  background:rgba(253,248,236,.18);
  border:1px solid rgba(253,248,236,.3);
  color:var(--bone);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
  transition:background .15s;
}
.mcls:hover{background:rgba(253,248,236,.32)}
.mbody{padding:22px 26px 28px}
.mmeta{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  margin-bottom:16px;
  padding-bottom:16px;
  border-bottom:1px solid var(--linen);
}
.mi{
  display:flex;
  align-items:center;
  gap:7px;
  font-family:var(--serif);
  font-size:1rem;
  color:var(--sepia);
}
.mi i{color:var(--camel);font-size:.92rem;flex-shrink:0}
.mi.cost{font-weight:600;color:var(--ink);font-family:var(--display)}
.mi.cost i{color:var(--gold)}
.mst{
  font-family:var(--display);
  font-size:.72rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.26em;
  color:var(--camel);
  margin:20px 0 9px;
}
.mdesc{
  font-family:var(--serif);
  font-size:1.08rem;
  line-height:1.7;
  color:var(--ink);
  max-height:180px;
  overflow-y:auto;
  font-weight:500;
}
.mico{font-size:2.2rem;margin:12px 0}
.mico.sf{color:var(--sf)}
.mico.eb{color:var(--eb)}
.tprices{display:flex;gap:11px;flex-wrap:wrap;margin-bottom:8px}
.tpcard{
  background:var(--cream);
  border:1px solid var(--linen);
  border-radius:4px;
  padding:12px 18px;
  min-width:122px;
}
.tpcard .pl{
  font-family:var(--display);
  font-size:.66rem;
  color:var(--camel);
  margin-bottom:5px;
  text-transform:uppercase;
  letter-spacing:.16em;
}
.tpcard .pv{
  font-family:var(--display);
  font-size:1.3rem;
  font-weight:700;
  color:var(--ink);
}
.tlink{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:11px 22px;
  background:var(--sepia);
  color:var(--bone);
  border-radius:3px;
  font-family:var(--display);
  font-size:.78rem;
  font-weight:600;
  text-decoration:none;
  margin-top:10px;
  letter-spacing:.16em;
  text-transform:uppercase;
  transition:background .15s;
}
.tlink:hover{background:var(--ink)}
.mapsec{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
.mcard-m{
  border:1px solid var(--linen);
  border-radius:4px;
  overflow:hidden;
  background:var(--cream);
}
.mcard-mh{
  background:var(--linen);
  padding:10px 14px;
  font-family:var(--display);
  font-size:.78rem;
  font-weight:600;
  color:var(--sepia);
  display:flex;
  align-items:center;
  gap:7px;
  border-bottom:1px solid var(--tan);
  letter-spacing:.06em;
}
.map-ph{
  height:200px;
  background:var(--cream);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  gap:8px;
  font-family:var(--serif);
  font-size:.92rem;
  font-style:italic;
  color:var(--camel);
  transition:background .15s;
}
.map-ph:hover{background:var(--cream-deep)}
.mcard-m iframe{display:block;width:100%;height:200px;border:none}
.mdt{padding:9px 14px;font-family:var(--serif);font-size:.88rem;color:var(--sepia)}
.mdt a{color:var(--camel);text-decoration:none;display:flex;align-items:center;gap:5px;font-style:italic}
.mdt a:hover{color:var(--sepia);text-decoration:underline}
.toolbar{
  position:sticky;
  top:0;
  z-index:5;
  background:var(--linen);
  border-bottom:1px solid var(--tan);
  padding:10px 18px;
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
}
.search-wrap{
  flex:1 1 220px;
  min-width:180px;
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--bone);
  border:1px solid var(--tan);
  border-radius:999px;
  padding:6px 12px;
  color:var(--sepia);
}
.search-wrap i.fa-magnifying-glass{font-size:.78rem;opacity:.6}
.search-input{
  flex:1;
  border:0;
  background:transparent;
  outline:none;
  font-family:var(--serif);
  font-size:.95rem;
  color:var(--ink);
  min-width:0;
}
.search-input::placeholder{color:var(--camel);opacity:.7;font-style:italic}
.search-clear{
  border:0;background:transparent;color:var(--camel);
  font-size:1.05rem;cursor:pointer;padding:0 2px;line-height:1;
}
.search-clear:hover{color:var(--sepia)}
.tabs{display:flex;gap:6px;flex:0 0 auto}
.tab-btn{
  font-family:var(--display);
  font-size:.74rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-weight:600;
  background:var(--bone);
  color:var(--sepia);
  border:1px solid var(--tan);
  border-radius:999px;
  padding:6px 14px;
  cursor:pointer;
  transition:background .12s,color .12s,border-color .12s;
}
.tab-btn:hover{background:var(--cream-deep)}
.tab-btn.active{background:var(--sepia);color:var(--linen);border-color:var(--sepia)}
.tab-btn[data-tab=sf].active{background:var(--sf);border-color:var(--sf)}
.tab-btn[data-tab=eb].active{background:var(--eb);border-color:var(--eb)}
.evb.dimmed,.pill.dimmed{
  opacity:.18;
  filter:grayscale(.6);
  pointer-events:none;
}

/* --- mobile diary (≤720px) --- */
.diary-mobile{display:none}
.diary-mobile .mcol-wrap{display:flex}
.diary-mobile .tax{flex:0 0 54px}
.diary-mobile .mcol{flex:1;position:relative;min-width:0}
.diary-mobile .mclust{position:absolute;left:0;right:0;padding:0 4px}
.diary-mobile .mclust .evb{position:relative;top:0;left:0;width:100%;height:100%}
.diary-mobile .mrail{
  display:flex;
  gap:8px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  height:100%;
  -webkit-overflow-scrolling:touch;
  padding-right:18px;
  scrollbar-width:none;
}
.diary-mobile .mrail::-webkit-scrollbar{display:none}
.diary-mobile .mrail .evb{
  flex:0 0 calc(100% - 18px);
  scroll-snap-align:start;
  position:relative;
}
/* --- Frankenstein knife-switch (SF ↔ East Bay) --- */
.fswitch{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:14px;
  user-select:none;
}
.fs-label{
  font-family:var(--display);
  font-weight:600;
  font-size:.74rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  background:transparent;
  border:0;
  padding:2px 0;
  cursor:pointer;
  color:#7a6a4f;
  opacity:.55;
  transition:color .22s ease,opacity .22s ease,text-shadow .22s ease;
  white-space:nowrap;
  font-family:inherit;
}
.fs-label{font-family:var(--display)}
.fswitch[data-connected="sf"] .fs-label.sf{
  color:#ffd4ca;opacity:1;
  text-shadow:0 0 6px #ff6448,0 0 14px rgba(255,100,72,.6),0 0 24px rgba(255,80,60,.25);
}
.fswitch[data-connected="eb"] .fs-label.eb{
  color:#dcf0c4;opacity:1;
  text-shadow:0 0 6px #6cc24a,0 0 14px rgba(110,200,90,.55),0 0 24px rgba(110,200,90,.22);
}
.fs-rig{
  position:relative;
  width:96px;height:48px;
  flex:0 0 auto;
  cursor:pointer;
}
.fs-base{
  position:absolute;left:4px;right:4px;bottom:0;height:10px;
  background:linear-gradient(180deg,#4a341f 0%,#1f140a 100%);
  border:1px solid #120b06;border-radius:3px;
  box-shadow:inset 0 1px 0 rgba(255,210,170,.08),0 1px 0 rgba(0,0,0,.3);
}
.fs-post{
  position:absolute;bottom:8px;width:6px;height:14px;
  background:linear-gradient(180deg,#d2ad84 0%,#7a5430 60%,#3a2818 100%);
  border-radius:2px 2px 0 0;border:1px solid #1a100a;
}
.fs-post.sf{left:9px}
.fs-post.eb{right:9px}
.fs-pivot-post{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  width:7px;height:20px;
  background:linear-gradient(180deg,#e0c096,#6b4928 70%,#2a1a10);
  border-radius:3px 3px 0 0;border:1px solid #1a100a;z-index:1;
}
.fs-orb{
  position:absolute;bottom:20px;width:12px;height:12px;border-radius:50%;
  z-index:2;border:1px solid #1a100a;

.fs-lever{
  position:absolute;
  bottom:24px;             /* sits just above the pivot top */
  left:50%;

  margin-left:-2px;
  background:linear-gradient(180deg,#e0c89e 0%,#7a5832 55%,#2a1c10 100%);
  border:1px solid #1a100a;border-radius:2px;
  transform-origin:0 50%;
  z-index:3;
  transition:transform .42s cubic-bezier(.55,-.05,.32,1.35);
}
.fs-lever::after{
  content:'';position:absolute;right:-7px;top:50%;transform:translateY(-50%);
  width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #f0d8b8, #6b4824 70%, #2a1a10);

}
.fswitch[data-state="sf"] .fs-lever{transform:rotate(160deg)}
.fswitch[data-state="eb"] .fs-lever{transform:rotate(20deg)}

  }).join('');
}
function rPills(evs,cls){return evs.map(function(e){const dimCls=shouldDim(e)?' dimmed':'';return '<div class="pill '+cls+dimCls+'" data-idx="'+EV.indexOf(e)+'" onclick="openModal(this)"><i class="fa-solid '+ic(e.tags)+'"></i> '+e.name+'</div>'}).join('')}
function rTL(){var h='';for(var i=S;i<=E;i++)h+='<div class="tl" style="top:'+px(i)+'px"><span class="hf">'+f12(i)+'</span></div>';return h}
const TH=(E-S)*PX,HL=Array.from({length:E-S+1},function(_,i){return '<div class="tl hr" style="top:'+px(S+i)+'px"></div>'}).join('');
function renderToolbar(){
  return '<div class="toolbar">'
    +'<div class="search-wrap"><i class="fa-solid fa-magnifying-glass"></i>'
    +'<input class="search-input" type="search" placeholder="filter by name, venue, city…" value="'+STATE.query.replace(/"/g,'&quot;')+'">'
    +(STATE.query?'<button class="search-clear" data-act="clear">×</button>':'')
    +'</div>'
    +'</div>';
}
function renderSwitch(){
  return '<div class="fswitch" data-state="'+STATE.tab+'" data-connected="'+STATE.tab+'" role="switch" aria-checked="'+(STATE.tab==='eb')+'">'
    +'<button class="fs-label sf" data-side="sf" type="button">SAN FRANCISCO</button>'
    +'<div class="fs-rig" role="presentation">'
      +'<div class="fs-base"></div>'
      +'<div class="fs-post sf"></div>'
      +'<div class="fs-post eb"></div>'
      +'<div class="fs-pivot-post"></div>'
      +'<div class="fs-orb sf"></div>'
      +'<div class="fs-orb eb"></div>'
      +'<div class="fs-lever"></div>'
    +'</div>'
    +'<button class="fs-label eb" data-side="eb" type="button">EAST BAY</button>'
  +'</div>';
}
function alldayHTML(){
  const isSF=STATE.tab==='sf';
  const evs=isSF?sfA:ebA,cls=isSF?'sf':'eb',lbl=isSF?'SF':'EB';
  return '<span class="allday-lbl">All Day</span><div class="allday-inner">'
    +(evs.length?'<div class="allday-sec"><span class="allday-sec-lbl '+cls+'">'+lbl+'</span>'+rPills(evs,cls)+'</div>':'')
    +'</div>';
}
function diaryHTML(){
  const isSF=STATE.tab==='sf';
  const evs=isSF?sfT:ebT,cls=isSF?'sf':'eb',title=isSF?'San Francisco Events':'East Bay Events';
  return '<div class="tax"><div class="taxl">'+rTL()+'</div></div>'
    +'<div class="cols">'
      +'<div class="col-hdr-row"><div class="col-hdr '+cls+'">'+title+'</div></div>'
      +'<div class="col-inner" style="height:'+TH+'px">'
        +'<div class="tlines">'+HL+'</div>'
        +'<div style="position:relative;height:'+TH+'px;flex:1;min-width:0">'+rEv(evs,cls)+'</div>'
      +'</div>'
    +'</div>';
}
function mobileDiaryHTML(){
  const filtered=timed.filter(function(e){return STATE.tab==='sf'?e.isSF:!e.isSF});
  return '<div class="mcol-wrap"><div class="tax"><div class="taxl">'+rTL()+'</div></div>'
    +'<div class="mcol" style="height:'+TH+'px"><div class="tlines">'+HL+'</div>'+rEvMobile(filtered)+'</div></div>';
}
function refreshDiaries(){
  document.getElementById('allday-mount').innerHTML=alldayHTML();
  document.getElementById('diary-mount').innerHTML=diaryHTML();
  document.getElementById('diary-mobile-mount').innerHTML=mobileDiaryHTML();
}
function fireFlicker(){
  const sw=document.querySelector('.fswitch');
  if(!sw)return;
  const t=STATE.tab;
  const els=[sw.querySelector('.fs-label.'+t), sw.querySelector('.fs-orb.'+t)].filter(Boolean);
  els.forEach(function(el){el.classList.remove('flicker')});
  void sw.offsetWidth;
  els.forEach(function(el){el.classList.add('flicker')});
  setTimeout(function(){els.forEach(function(el){el.classList.remove('flicker')})},420);
}
let throwInFlight=false;
function setTab(t){
  if(STATE.tab===t||throwInFlight)return;
  STATE.tab=t;
  const sw=document.querySelector('.fswitch');
  if(!sw)return;
  throwInFlight=true;
  sw.dataset.state=t;             // start lever animation
  sw.removeAttribute('data-connected'); // de-energize both sides immediately
  sw.setAttribute('aria-checked',t==='eb');
  const lever=sw.querySelector('.fs-lever');
  let done=false;
  const land=function(){
    if(done)return;
    done=true;
    lever.removeEventListener('transitionend',land);
    clearTimeout(fb);
    sw.dataset.connected=t;       // contact made → energize target side
    fireFlicker();
    refreshDiaries();
    throwInFlight=false;
  };
  lever.addEventListener('transitionend',land);
  const fb=setTimeout(land,560);  // safety fallback if transitionend never fires
}
function wire(){
  const inp=document.querySelector('.search-input');
  if(inp)inp.oninput=function(e){STATE.query=e.target.value;syncClear();refreshDiaries()};
  const clr=document.querySelector('.search-clear');
  if(clr)clr.onclick=clearSearch;
  document.querySelectorAll('.fs-label').forEach(function(el){
    el.onclick=function(ev){ev.stopPropagation();setTab(el.dataset.side)};
  });
  const rig=document.querySelector('.fs-rig');
  if(rig)rig.onclick=function(){setTab(STATE.tab==='sf'?'eb':'sf')};
}
function clearSearch(){
  STATE.query='';
  const inp=document.querySelector('.search-input');
  if(inp)inp.value='';
  syncClear();
  refreshDiaries();
  if(inp)inp.focus();
}
function syncClear(){
  const sw=document.querySelector('.search-wrap');
  if(!sw)return;
  let clr=sw.querySelector('.search-clear');
  if(STATE.query&&!clr){
    sw.insertAdjacentHTML('beforeend','<button class="search-clear">×</button>');
    sw.querySelector('.search-clear').onclick=clearSearch;
  } else if(!STATE.query&&clr){clr.remove()}
}
function renderApp(){
  document.getElementById('app').innerHTML=
    '<div class="hdr">'
      +'<div class="hdr-l">'
        +'<div class="hdr-title"><i class="fa-solid fa-feather-pointed"></i>Pick some things to do</div>'
        +'<div class="hdr-sub">or we can just wing it</div>'
      +'</div>'
      +renderSwitch()
    +'</div>'
    +renderToolbar()
    +'<div class="allday-bar" id="allday-mount">'+alldayHTML()+'</div>'
    +'<div class="diary" id="diary-mount">'+diaryHTML()+'</div>'
    +'<div class="diary-mobile" id="diary-mobile-mount">'+mobileDiaryHTML()+'</div>'
    +'<div class="ovl" id="ovl" onclick="if(event.target===this)closeModal()"><div class="mcard" id="mcard"></div></div>';
  wire();
  fireFlicker();
}
renderApp();
window.openModal=function(el){
  var idx=parseInt(el.dataset.idx),ev=EV[idx],i=ic(ev.tags),cls=ev.isSF?'sf':'eb',dR=dm(ev.venue,'R'),dO=dm(ev.venue,'O');
  var ts='';
  if(!ev.allDay&&ev.dateStart&&!ev.dateStart.endsWith('T00:00:00Z')){var st=f12(ph(ev.dateStart)),en=ev.dateEnd?f12(ph(ev.dateEnd)):'';ts=st+(en?' - '+en:'')}
  else ts='All Day / Book Ahead';
  var tk='';
  if(ev.price!=null&&ev.price>0){var lo=ev.price,hi=ev.priceHigh||ev.price,fmt=function(v){return '$'+(Math.round(v*100)/100).toFixed(2)},r2=lo===hi?fmt(lo*2):fmt(lo*2)+'-'+fmt(hi*2),r3=lo===hi?fmt(lo*3):fmt(lo*3)+'-'+fmt(hi*3);tk='<div class="mst">Ticket Pricing</div><div class="tprices"><div class="tpcard"><div class="pl">2 Adults</div><div class="pv">'+r2+'</div></div><div class="tpcard"><div class="pl">3 Adults</div><div class="pv">'+r3+'</div></div></div>'}
  if(ev.tickets&&ev.tickets.length&&ev.tickets[0].url)tk+='<a class="tlink" href="'+ev.tickets[0].url+'" target="_blank"><i class="fa-solid fa-ticket"></i> Buy Tickets</a>';
  var va=[ev.venue,ev.address,ev.city].filter(Boolean).join(', ');
  var mR='https://www.google.com/maps/dir/'+encodeURIComponent(OR)+'/'+encodeURIComponent(va);
  var mO='https://www.google.com/maps/dir/'+encodeURIComponent(OO)+'/'+encodeURIComponent(va);
  var eR='https://www.google.com/maps/embed/v1/directions?key='+MKEY+'&origin='+encodeURIComponent(OR)+'&destination='+encodeURIComponent(va)+'&mode=driving';
  var eO='https://www.google.com/maps/embed/v1/directions?key='+MKEY+'&origin='+encodeURIComponent(OO)+'&destination='+encodeURIComponent(va)+'&mode=driving';
  function mb(id,lbl,d,ou,eu){return '<div class="mcard-m"><div class="mcard-mh"><i class="fa-solid fa-route"></i> From '+lbl+(d?' (~'+d+' min)':'')+'</div><div class="map-ph" id="mp-'+id+'" data-embed="'+eu.replace(/&/g,'&amp;').replace(/"/g,'&quot;')+'" onclick="loadMap(this)"><i class="fa-solid fa-map-location-dot"></i> Tap to load map</div><div class="mdt"><a href="'+ou+'" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i> Open in Google Maps</a></div></div>'}
  var hi=ev.imgMedium?'<img src="'+ev.imgMedium+'" style="width:100%;height:100%;object-fit:cover;opacity:.5">':'';
  var src=ev.sourceUrl?'<div class="mdt" style="margin-top:8px"><a href="'+ev.sourceUrl+'" target="_blank"><i class="fa-solid fa-link"></i> Event source</a></div>':'';
  document.getElementById('mcard').innerHTML='<div class="mhero">'+hi+'<button class="mcls" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button><div class="mhero-c"><div class="mcat '+cls+'">'+ev.city.replace(', CA','')+'</div><div class="mhero-img">'+ev.name+'</div></div></div><div class="mbody"><div class="mmeta">'+(ev.venue?'<div class="mi"><i class="fa-solid fa-location-dot"></i>'+ev.venue+(ev.address?', '+ev.address:'')+'</div>':'')+'<div class="mi"><i class="fa-solid fa-city"></i>'+ev.city.replace(', CA','')+'</div><div class="mi"><i class="fa-regular fa-clock"></i>'+ts+'</div>'+(ev.cost?'<div class="mi cost"><i class="fa-solid fa-gift"></i>'+ev.cost+'</div>':'')+'</div><i class="fa-solid '+i+' mico '+cls+'"></i>'+(ev.description?'<div class="mst">About</div><div class="mdesc">'+ev.description+'</div>':'')+tk+src+'<div class="mst">Getting There</div><div class="mapsec">'+mb('r','Richmond (540 31st St)',dR,mR,eR)+mb('o','Oakland (4458 Pampas Ave)',dO,mO,eO)+'</div></div>';
  document.getElementById('ovl').classList.add('active');
};
window.closeModal=function(){document.getElementById('ovl').classList.remove('active')};
window.loadMap=function(el){var url=el.getAttribute('data-embed');if(!url)return;var f=document.createElement('iframe');f.src=url.replace(/&amp;/g,'&').replace(/&quot;/g,'"');f.style.cssText='display:block;width:100%;height:200px;border:none';f.loading='lazy';el.parentNode.replaceChild(f,el)};
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});
})();
</script>
</body>
</html>
