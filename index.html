function ic(t){if(!t||!t.length)return'fa-calendar';if(t.some(x=>[17,94,95,96,100].includes(x)))return'fa-music';if(t.some(x=>[2,19].includes(x)))return'fa-masks-theater';if(t.some(x=>[20,430].includes(x)))return'fa-face-grin-squint';if(t.some(x=>[84,15].includes(x)))return'fa-person-dancing';if(t.some(x=>[28,3,4].includes(x)))return'fa-palette';if(t.some(x=>[7,40,76].includes(x)))return'fa-graduation-cap';if(t.some(x=>[10,60,38,47].includes(x)))return'fa-spa';if(t.some(x=>[21,29].includes(x)))return'fa-martini-glass';if(t.some(x=>[8,11].includes(x)))return'fa-people-group';return'fa-star'}
function ph(s){const m=s.match(/T(\d{2}):(\d{2})/);return m?parseInt(m[1])+parseInt(m[2])/60:null}
function f12(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60),ap=hh>=12?'pm':'am',hr=hh>12?hh-12:(hh===0?12:hh);return hr+(mm?':'+String(mm).padStart(2,'0'):'')+ap}
const S=7,E=23,PX=72;
function px(h){return(h-S)*PX}
const timed=EV.filter(e=>!e.allDay&&e.dateStart&&!e.dateStart.endsWith('T00:00:00Z'));
const allDay=EV.filter(e=>e.allDay||(e.dateStart&&e.dateStart.endsWith('T00:00:00Z')&&!e.dateEnd));
const sfT=timed.filter(e=>e.isSF),ebT=timed.filter(e=>!e.isSF);
const sfA=allDay.filter(e=>e.isSF),ebA=allDay.filter(e=>!e.isSF);
function pack(evs){const sorted=[...evs].sort((a,b)=>ph(a.dateStart)-ph(b.dateStart)),cols=[],out=[];sorted.forEach(ev=>{const st=ph(ev.dateStart),en=ev.dateEnd?ph(ev.dateEnd):st+1;let ok=false;for(let c=0;c<cols.length;c++){if(cols[c]<=st){cols[c]=en;out.push({ev,col:c});ok=true;break}}if(!ok){cols.push(en);out.push({ev,col:cols.length-1})}});const mc=cols.length;out.forEach(o=>o.totalCols=mc);return out}
function rEv(evs,cls){return pack(evs).map(({ev,col,totalCols})=>{const st=ph(ev.dateStart),en=ev.dateEnd?ph(ev.dateEnd):st+1,top=px(st),h=Math.max(px(en)-top,28),w=100/totalCols,l=col*w,i=ic(ev.tags),d=dm(ev.venue,'R');return'<div class="evb '+cls+'" data-idx="'+EV.indexOf(ev)+'" onclick="openModal(this)" style="top:'+top+'px;height:'+h+'px;left:'+l+'%;width:'+w+'%"><div class="ev-title">'+ev.name+'</div><div class="ev-city">'+ev.city.replace(', CA','')+'</div>'+(d?'<span class="ev-drive"><i class="fa-solid fa-car"></i> '+d+' min</span>':'')+(ev.cost?'<span class="ev-cost">'+ev.cost+'</span>':'')+'<i class="fa-solid '+i+' ev-ico"></i></div>'}).join('')}
function rPills(evs,cls){return evs.map(e=>'<div class="pill '+cls+'" data-idx="'+EV.indexOf(e)+'" onclick="openModal(this)"><i class="fa-solid '+ic(e.tags)+'"></i> '+e.name+'</div>').join('')}
function rTL(){let h='';for(let i=S;i<=E;i++)h+='<div class="tl" style="top:'+px(i)+'px"><span class="hf">'+f12(i)+'</span></div>';return h}
const TH=(E-S)*PX,HL=Array.from({length:E-S+1},(_,i)=>'<div class="tl hr" style="top:'+px(S+i)+'px"></div>').join('');
document.getElementById('app').innerHTML='<div class="hdr"><div><div class="hdr-title"><i class="fa-solid fa-map-location-dot"></i> Bay Area Events</div><div class="hdr-sub">Tuesday, May 12, 2026</div></div><div class="hdr-right"><div class="leg"><div class="leg-dot" style="background:var(--sf)"></div>San Francisco</div><div class="leg"><div class="leg-dot" style="background:var(--eb)"></div>East Bay</div></div></div><div class="allday-bar"><span class="allday-lbl">All Day</span><div class="allday-inner">'+(sfA.length?'<div class="allday-sec"><span class="allday-sec-lbl sf">SF</span>'+rPills(sfA,'sf')+'</div>':'')+(ebA.length?'<div class="allday-sec"><span class="allday-sec-lbl eb">EB</span>'+rPills(ebA,'eb')+'</div>':'')+'</div></div><div class="diary"><div class="tax"><div class="taxl">'+rTL()+'</div></div><div class="cols"><div class="col-hdr-row"><div class="col-hdr sf">San Francisco Events</div><div class="col-hdr eb">East Bay Events</div></div><div class="col-inner" style="height:'+TH+'px"><div class="tlines">'+HL+'</div><div style="position:relative;height:'+TH+'px;flex:1;min-width:0">'+rEv(sfT,'sf')+'</div><div style="position:relative;height:'+TH+'px;flex:1;min-width:0">'+rEv(ebT,'eb')+'</div></div></div></div><div class="ovl" id="ovl" onclick="if(event.target===this)closeModal()"><div class="mcard" id="mcard"></div></div>';
window.openModal=function(el){const idx=parseInt(el.dataset.idx),ev=EV[idx],i=ic(ev.tags),cls=ev.isSF?'sf':'eb',dR=dm(ev.venue,'R'),dO=dm(ev.venue,'O');let ts='';if(!ev.allDay&&ev.dateStart&&!ev.dateStart.endsWith('T00:00:00Z')){const st=f12(ph(ev.dateStart)),en=ev.dateEnd?f12(ph(ev.dateEnd)):'';ts=st+(en?' \u2013 '+en:'')}else ts='All Day / Book Ahead';let tk='';if(ev.price!=null&&ev.price>0){const lo=ev.price,hi=ev.priceHigh||ev.price,fmt=v=>'$'+(Math.round(v*100)/100).toFixed(2),r2=lo===hi?fmt(lo*2):fmt(lo*2)+'\u2013'+fmt(hi*2),r3=lo===hi?fmt(lo*3):fmt(lo*3)+'\u2013'+fmt(hi*3);tk='<div class="mst">Ticket Pricing</div><div class="tprices"><div class="tpcard"><div class="pl">2 Adults</div><div class="pv">'+r2+'</div></div><div class="tpcard"><div class="pl">3 Adults</div><div class="pv">'+r3+'</div></div></div>'}if(ev.tickets&&ev.tickets.length&&ev.tickets[0].url)tk+='<a class="tlink" href="'+ev.tickets[0].url+'" target="_blank"><i class="fa-solid fa-ticket"></i> Buy Tickets</a>';const va=[ev.venue,ev.address,ev.city].filter(Boolean).join(', '),mR='https://www.google.com/maps/dir/'+encodeURIComponent(OR)+'/'+encodeURIComponent(va),mO='https://www.google.com/maps/dir/'+encodeURIComponent(OO)+'/'+encodeURIComponent(va),eR='https://www.google.com/maps/embed/v1/directions?key=AIzaSyD-9tSrke72PouQMnMX-a7eZSW0jkFMBWY&origin='+encodeURIComponent(OR)+'&destination='+encodeURIComponent(va)+'&mode=driving',eO='https://www.google.com/maps/embed/v1/directions?key=AIzaSyD-9tSrke72PouQMnMX-a7eZSW0jkFMBWY&origin='+encodeURIComponent(OO)+'&destination='+encodeURIComponent(va)+'&mode=driving';function mb(id,lbl,d,ou,eu){return'<div class="mcard-m"><div class="mcard-mh"><i class="fa-solid fa-route"></i> From '+lbl+(d?' (~'+d+' min)':'')+'</div><div class="map-ph" id="mp-'+id+'" onclick="loadMap(\'' +id+ '\',\'' +eu.replace(/\x27/g,\"\\\'\")+'\')" ><i class="fa-solid fa-map-location-dot"></i> Tap to load map</div><div class="mdt"><i class="fa-solid fa-arrow-up-right-from-square"></i><a href="'+ou+'" target="_blank">Open in Google Maps \u2197</a></div></div>'}const hi=ev.imgMedium?'<img src="'+ev.imgMedium+'" style="width:100%;height:100%;object-fit:cover;opacity:.5">':'',src=ev.sourceUrl?'<div class="mdt" style="margin-top:8px"><i class="fa-solid fa-link"></i><a href="'+ev.sourceUrl+'" target="_blank">Event source \u2197</a></div>':'';document.getElementById('mcard').innerHTML='<div class="mhero">'+hi+'<button class="mcls" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button><div class="mhero-c"><div class="mcat '+cls+'">'+ev.city.replace(', CA','')+'</div><div class="mhero-img">'+ev.name+'</div></div></div><div class="mbody"><div class="mmeta">'+(ev.venue?'<div class="mi"><i class="fa-solid fa-location-dot"></i>'+ev.venue+(ev.address?', '+ev.address:'')+'</div>':'')+'<div class="mi"><i class="fa-solid fa-city"></i>'+ev.city.replace(', CA','')+'</div><div class="mi"><i class="fa-regular fa-clock"></i>'+ts+'</div>'+(ev.cost?'<div class="mi cost"><i class="fa-solid fa-gift"></i>'+ev.cost+'</div>':'')+'</div><i class="fa-solid '+i+' mico '+cls+'"></i>'+(ev.description?'<div class="mst">About</div><div class="mdesc">'+ev.description+'</div>':'')+tk+src+'<div class="mst">Getting There</div><div class="mapsec">'+mb('r','Richmond (540 31st St)',dR,mR,eR)+mb('o','Oakland (4458 Pampas Ave)',dO,mO,eO)+'</div></div>';document.getElementById('ovl').classList.add('active')};
window.closeModal=function(){document.getElementById('ovl').classList.remove('active')};
window.loadMap=function(id,url){const ph=document.getElementById('mp-'+id);if(!ph)return;const f=document.createElement('iframe');f.src=url;f.style.cssText='display:block;width:100%;height:200px;border:none';f.loading='lazy';ph.parentNode.replaceChild(f,ph)};
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});
})();</script>
</body>
